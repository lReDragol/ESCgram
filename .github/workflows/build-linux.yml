name: build-linux

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libfontconfig1 \
            libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build app (PyInstaller)
        run: |
          pyinstaller --noconfirm packaging/escgram.spec

      - name: Assemble Linux package
        run: |
          mkdir -p dist_installer
          mkdir -p dist_linux/ESCgram-linux/app
          cp -a dist/ESCgram/. dist_linux/ESCgram-linux/app/
          cp packaging/linux/install.sh dist_linux/ESCgram-linux/install.sh
          cp packaging/linux/uninstall.sh dist_linux/ESCgram-linux/uninstall.sh
          chmod +x dist_linux/ESCgram-linux/install.sh dist_linux/ESCgram-linux/uninstall.sh
          tar -C dist_linux -czf dist_installer/ESCgram-linux.tar.gz ESCgram-linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: escgram-linux
          path: |
            dist_installer/ESCgram-linux.tar.gz

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist_installer/ESCgram-linux.tar.gz
